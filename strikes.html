<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCIDENTS | MIDEAST</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ccc; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; line-height: 1.3; }
        .terminal { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #ff6600; color: #000; padding: 3px 8px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .nav { background: #000; border-bottom: 1px solid #333; display: flex; flex-shrink: 0; }
        .nav a { color: #fa0; text-decoration: none; padding: 4px 16px; font-size: 11px; border-right: 1px solid #333; }
        .nav a:hover { background: #111; }
        .nav a.active { background: #ff6600; color: #000; font-weight: 700; }
        
        .toolbar { background: #111; border-bottom: 1px solid #333; padding: 6px 8px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .toolbar .filters { display: flex; gap: 12px; align-items: center; }
        .toolbar label { color: #666; font-size: 10px; }
        .toolbar select { background: #000; color: #ff6600; border: 1px solid #333; padding: 3px 8px; font-family: inherit; font-size: 11px; }
        .toolbar .stats { display: flex; gap: 12px; align-items: center; }
        .toolbar .stats .count { color: #0cc; }
        .status-light { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .status-light.live { background: #0c0; animation: pulse 2s infinite; }
        .status-light.cached { background: #ff0; }
        .status-light.offline { background: #f33; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .main { display: flex; flex: 1; min-height: 0; }
        .map-container { flex: 1; position: relative; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        
        .sidebar { width: 380px; background: #000; border-left: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { background: #ff6600; color: #000; padding: 4px 8px; font-weight: 700; font-size: 11px; display: flex; justify-content: space-between; }
        .feed { flex: 1; overflow-y: auto; }
        .feed-item { padding: 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .feed-item:hover { background: #111; }
        .feed-item .source-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .feed-item .source { color: #0cc; font-size: 10px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .feed-item .time { color: #666; font-size: 9px; }
        .feed-item .title { color: #ccc; font-size: 11px; line-height: 1.4; }
        .feed-item .title a { color: #ccc; text-decoration: none; }
        .feed-item .title a:hover { color: #ff6600; text-decoration: underline; }
        .feed-item .keywords { margin-top: 4px; }
        .feed-item .keyword { display: inline-block; background: #1a1a1a; color: #888; padding: 1px 4px; font-size: 9px; margin-right: 4px; }
        .feed-item .keyword.conflict { background: #300; color: #f66; }
        .feed-item .keyword.location { background: #030; color: #6f6; }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #333; border-top-color: #ff6600; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-banner { background: #300; color: #f66; padding: 6px 8px; font-size: 10px; }
        
        .footer { background: #111; border-top: 1px solid #333; padding: 4px 8px; font-size: 10px; color: #666; display: flex; justify-content: space-between; flex-shrink: 0; }
        .footer .key { background: #ff6600; color: #000; padding: 0 3px; font-weight: 700; margin-right: 2px; }
        
        /* Leaflet */
        .leaflet-popup-content-wrapper { background: #111; color: #ccc; border-radius: 0; border: 1px solid #333; font-family: 'Consolas', monospace; font-size: 11px; }
        .leaflet-popup-tip { background: #111; }
        .leaflet-popup-content { margin: 10px; min-width: 250px; max-width: 350px; }
        .leaflet-popup-close-button { color: #666 !important; }
        .leaflet-popup-close-button:hover { color: #ff6600 !important; }
        .popup-title { color: #ff6600; font-weight: 700; font-size: 11px; margin-bottom: 8px; line-height: 1.3; }
        .popup-row { margin: 4px 0; font-size: 10px; }
        .popup-row .k { color: #666; }
        .popup-row .v { color: #ccc; }
        .popup-row a { color: #0cc; text-decoration: underline; }
        .leaflet-control-zoom { border: none !important; }
        .leaflet-control-zoom a { background: #111 !important; color: #ff6600 !important; border: 1px solid #333 !important; }
        .leaflet-control-zoom a:hover { background: #222 !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
<div class="terminal">
    <div class="header">
        <span>MIDEAST INCIDENT & NEWS TRACKER — GDELT + RSS</span>
        <span id="clock"></span>
    </div>
    <div class="nav">
        <a href="index.html">OVERVIEW</a>
        <a href="flights.html">FLIGHTS</a>
        <a href="strikes.html" class="active">INCIDENTS</a>
    </div>
    
    <div id="errorBanner" class="error-banner" style="display:none;"></div>
    
    <div class="toolbar">
        <div class="filters">
            <div>
                <label>TOPIC</label>
                <select id="topicFilter">
                    <option value="conflict">Conflict/Military</option>
                    <option value="aviation">Aviation</option>
                    <option value="shipping">Shipping/Maritime</option>
                </select>
            </div>
            <div>
                <label>TIMESPAN</label>
                <select id="timeFilter">
                    <option value="24h">24 Hours</option>
                    <option value="3d" selected>3 Days</option>
                    <option value="7d">7 Days</option>
                </select>
            </div>
        </div>
        <div class="stats">
            <span><span class="status-light" id="statusLight"></span><span id="dataStatus">Loading...</span></span>
            <span class="count">ARTICLES: <span id="articleCount">0</span></span>
        </div>
    </div>
    
    <div class="main">
        <div class="map-container">
            <div id="map"></div>
        </div>
        <div class="sidebar">
            <div class="sidebar-header">
                <span>NEWS FEED</span>
                <span id="feedSource">GDELT</span>
            </div>
            <div class="feed" id="feed">
                <div class="loading"><span class="spinner"></span>Fetching news from GDELT...</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div><span class="key">CLICK</span>VIEW ON MAP <span class="key">LINK</span>OPEN ARTICLE</div>
        <span>DATA: GDELT PROJECT | REFRESH 5M</span>
    </div>
</div>

<script>
const GDELT_BASE = 'https://api.gdeltproject.org/api/v2/doc/doc';
const CORS_PROXY = 'https://corsproxy.io/?';

const TOPICS = {
    conflict: {
        query: '(missile OR strike OR attack OR military OR airstrike OR drone) (Iran OR Israel OR Yemen OR Houthi OR Gaza OR UAE OR Saudi)',
        keywords: ['missile', 'strike', 'attack', 'military', 'drone', 'airstrike', 'intercept', 'bomb', 'war', 'conflict']
    },
    aviation: {
        query: '(flight OR airline OR airport OR airspace OR aviation) (Dubai OR Abu Dhabi OR Doha OR Riyadh OR Middle East OR Gulf)',
        keywords: ['flight', 'airline', 'airport', 'cancel', 'divert', 'airspace', 'closure']
    },
    shipping: {
        query: '(shipping OR tanker OR vessel OR maritime OR Hormuz OR Red Sea OR Houthi) (attack OR threat OR warning)',
        keywords: ['ship', 'tanker', 'vessel', 'maritime', 'port', 'strait', 'Hormuz', 'Red Sea']
    }
};

// Location coordinates for geo-tagging articles
const LOCATIONS = {
    'dubai': { lat: 25.20, lon: 55.27 },
    'abu dhabi': { lat: 24.45, lon: 54.37 },
    'iran': { lat: 32.43, lon: 53.69 },
    'tehran': { lat: 35.70, lon: 51.42 },
    'israel': { lat: 31.05, lon: 34.85 },
    'tel aviv': { lat: 32.08, lon: 34.78 },
    'gaza': { lat: 31.50, lon: 34.47 },
    'yemen': { lat: 15.55, lon: 48.52 },
    'sanaa': { lat: 15.35, lon: 44.21 },
    'saudi': { lat: 24.71, lon: 46.68 },
    'riyadh': { lat: 24.69, lon: 46.72 },
    'jeddah': { lat: 21.54, lon: 39.17 },
    'qatar': { lat: 25.29, lon: 51.53 },
    'doha': { lat: 25.29, lon: 51.53 },
    'bahrain': { lat: 26.07, lon: 50.56 },
    'kuwait': { lat: 29.38, lon: 47.99 },
    'oman': { lat: 21.47, lon: 55.98 },
    'hormuz': { lat: 26.50, lon: 56.50 },
    'red sea': { lat: 20.00, lon: 38.00 },
    'syria': { lat: 34.80, lon: 38.99 },
    'damascus': { lat: 33.51, lon: 36.29 },
    'iraq': { lat: 33.22, lon: 43.68 },
    'baghdad': { lat: 33.31, lon: 44.37 },
    'lebanon': { lat: 33.85, lon: 35.86 },
    'beirut': { lat: 33.89, lon: 35.50 },
    'houthi': { lat: 15.35, lon: 44.21 },
    'isfahan': { lat: 32.65, lon: 51.68 },
    'bandar abbas': { lat: 27.18, lon: 56.27 }
};

let articles = [];
let markers = [];
let map;

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleString('en-US', {
        timeZone: 'UTC', weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }) + ' UTC';
}
updateClock();
setInterval(updateClock, 1000);

// Map setup
map = L.map('map', { zoomControl: true }).setView([28, 48], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM © CARTO', maxZoom: 19
}).addTo(map);

function extractLocation(title) {
    const lowerTitle = title.toLowerCase();
    for (const [name, coords] of Object.entries(LOCATIONS)) {
        if (lowerTitle.includes(name)) {
            // Add some randomness to prevent overlapping markers
            return {
                lat: coords.lat + (Math.random() - 0.5) * 0.5,
                lon: coords.lon + (Math.random() - 0.5) * 0.5,
                location: name
            };
        }
    }
    return null;
}

function extractKeywords(title, topicKeywords) {
    const lowerTitle = title.toLowerCase();
    const found = [];
    topicKeywords.forEach(kw => {
        if (lowerTitle.includes(kw.toLowerCase())) {
            found.push(kw);
        }
    });
    // Also extract locations
    Object.keys(LOCATIONS).forEach(loc => {
        if (lowerTitle.includes(loc)) {
            found.push(loc);
        }
    });
    return [...new Set(found)].slice(0, 5);
}

function timeAgo(dateStr) {
    const date = new Date(dateStr);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    
    if (diffMins < 60) return `${diffMins}m ago`;
    if (diffHours < 24) return `${diffHours}h ago`;
    return `${diffDays}d ago`;
}

function domainFromUrl(url) {
    try {
        return new URL(url).hostname.replace('www.', '');
    } catch {
        return url.slice(0, 30);
    }
}

function updateStatus(text, status) {
    document.getElementById('dataStatus').textContent = text;
    document.getElementById('statusLight').className = 'status-light ' + status;
}

function showError(msg) {
    const banner = document.getElementById('errorBanner');
    banner.textContent = msg;
    banner.style.display = msg ? 'block' : 'none';
}

async function fetchGDELT(topic, timespan) {
    const config = TOPICS[topic];
    const url = `${GDELT_BASE}?query=${encodeURIComponent(config.query)}&mode=artlist&format=json&maxrecords=75&timespan=${timespan}&sort=datedesc`;
    
    try {
        // Try direct first
        let response = await fetch(url);
        if (!response.ok) throw new Error('Direct failed');
        const text = await response.text();
        if (text.includes('Please limit requests')) throw new Error('Rate limited');
        return JSON.parse(text);
    } catch (e) {
        // Try CORS proxy
        try {
            const response = await fetch(CORS_PROXY + encodeURIComponent(url));
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            if (text.includes('Please limit requests')) throw new Error('GDELT rate limited - try again in a few seconds');
            return JSON.parse(text);
        } catch (e2) {
            throw new Error(e2.message);
        }
    }
}

function renderArticles(topic) {
    const config = TOPICS[topic];
    
    // Clear map markers
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    
    const feed = document.getElementById('feed');
    
    if (articles.length === 0) {
        feed.innerHTML = '<div class="loading">No articles found for this topic</div>';
        document.getElementById('articleCount').textContent = '0';
        return;
    }
    
    document.getElementById('articleCount').textContent = articles.length;
    
    feed.innerHTML = articles.map((art, i) => {
        const keywords = extractKeywords(art.title, config.keywords);
        const location = extractLocation(art.title);
        
        // Add marker if we found a location
        if (location) {
            const marker = L.circleMarker([location.lat, location.lon], {
                radius: 6,
                color: '#f33',
                fillColor: '#f33',
                fillOpacity: 0.6,
                weight: 1
            }).addTo(map);
            
            marker.bindPopup(`
                <div class="popup-title">${art.title}</div>
                <div class="popup-row"><span class="k">source:</span> <span class="v">${domainFromUrl(art.url)}</span></div>
                <div class="popup-row"><span class="k">date:</span> <span class="v">${art.seendate || 'Unknown'}</span></div>
                <div class="popup-row"><span class="k">location:</span> <span class="v">${location.location}</span></div>
                <div class="popup-row"><a href="${art.url}" target="_blank">Read Article →</a></div>
            `);
            
            markers.push(marker);
            art._marker = marker;
            art._location = location;
        }
        
        return `
            <div class="feed-item" data-index="${i}">
                <div class="source-row">
                    <span class="source">${domainFromUrl(art.url)}</span>
                    <span class="time">${art.seendate ? timeAgo(art.seendate) : ''}</span>
                </div>
                <div class="title"><a href="${art.url}" target="_blank">${art.title}</a></div>
                <div class="keywords">
                    ${keywords.map(kw => {
                        const isConflict = config.keywords.includes(kw);
                        const isLocation = LOCATIONS[kw];
                        return `<span class="keyword ${isConflict ? 'conflict' : ''} ${isLocation ? 'location' : ''}">${kw}</span>`;
                    }).join('')}
                </div>
            </div>
        `;
    }).join('');
    
    // Click handlers for feed items
    feed.querySelectorAll('.feed-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') return; // Let links work
            const idx = parseInt(item.dataset.index);
            const art = articles[idx];
            if (art._location && art._marker) {
                map.flyTo([art._location.lat, art._location.lon], 6, { duration: 0.5 });
                art._marker.openPopup();
            }
        });
    });
}

async function refresh() {
    const topic = document.getElementById('topicFilter').value;
    const timespan = document.getElementById('timeFilter').value;
    const cacheKey = `gdelt_${topic}_${timespan}`;
    
    document.getElementById('feed').innerHTML = '<div class="loading"><span class="spinner"></span>Fetching news from GDELT...</div>';
    updateStatus('Loading...', 'cached');
    showError('');
    
    try {
        const data = await fetchGDELT(topic, timespan);
        articles = data.articles || [];
        
        updateStatus(`LIVE — ${articles.length} articles`, 'live');
        document.getElementById('feedSource').textContent = 'GDELT LIVE';
        showError('');
        
        // Cache
        localStorage.setItem(cacheKey, JSON.stringify({ time: Date.now(), articles }));
        
        renderArticles(topic);
    } catch (err) {
        console.error('GDELT error:', err);
        showError('GDELT: ' + err.message);
        
        // Try cache
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
            const { time, articles: cachedArticles } = JSON.parse(cached);
            const ageMin = Math.round((Date.now() - time) / 60000);
            articles = cachedArticles;
            updateStatus(`CACHED (${ageMin}m old)`, 'cached');
            document.getElementById('feedSource').textContent = 'CACHED';
            renderArticles(topic);
        } else {
            updateStatus('OFFLINE', 'offline');
            document.getElementById('feed').innerHTML = '<div class="loading">Failed to load data. Try refreshing in a few seconds.</div>';
        }
    }
}

// Event listeners
document.getElementById('topicFilter').addEventListener('change', refresh);
document.getElementById('timeFilter').addEventListener('change', refresh);

// Initial load
refresh();

// Auto-refresh every 5 minutes
setInterval(refresh, 300000);

// Full page refresh every 30 min
setTimeout(() => location.reload(), 1800000);
</script>
</body>
</html>
