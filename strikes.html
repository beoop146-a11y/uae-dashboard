<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCIDENTS | MIDEAST</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ccc; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; line-height: 1.3; }
        .terminal { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #ff6600; color: #000; padding: 3px 8px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .nav { background: #000; border-bottom: 1px solid #333; display: flex; flex-shrink: 0; }
        .nav a { color: #fa0; text-decoration: none; padding: 4px 16px; font-size: 11px; border-right: 1px solid #333; }
        .nav a:hover { background: #111; }
        .nav a.active { background: #ff6600; color: #000; font-weight: 700; }
        .ticker { background: #111; border-bottom: 1px solid #333; padding: 4px 8px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .ticker .label { color: #ff6600; }
        .ticker select { background: #000; color: #ff6600; border: 1px solid #333; padding: 2px 8px; font-family: inherit; font-size: 11px; cursor: pointer; }
        .ticker select:hover { border-color: #ff6600; }
        .ticker .count { color: #0cc; }
        
        .main { display: flex; flex: 1; min-height: 0; }
        .map-container { flex: 1; position: relative; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        
        .sidebar { width: 320px; background: #000; border-left: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { background: #ff6600; color: #000; padding: 4px 8px; font-weight: 700; font-size: 11px; }
        .feed { flex: 1; overflow-y: auto; }
        .feed-item { padding: 6px 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .feed-item:hover { background: #111; }
        .feed-item .type { color: #f33; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .feed-item .type.naval { color: #0cc; }
        .feed-item .type.military { color: #ff0; }
        .feed-item .title { color: #ccc; font-size: 11px; margin: 2px 0; line-height: 1.3; }
        .feed-item .meta { color: #666; font-size: 9px; }
        .feed-item .meta .country { color: #ff6600; }
        
        .stats { border-top: 1px solid #333; padding: 8px; flex-shrink: 0; }
        .stats-title { color: #ff6600; font-size: 10px; margin-bottom: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .stats-item { text-align: center; padding: 4px; background: #111; }
        .stats-item .num { color: #f33; font-size: 14px; font-weight: 700; }
        .stats-item .lbl { color: #666; font-size: 8px; }
        
        .footer { background: #111; border-top: 1px solid #333; padding: 4px 8px; font-size: 10px; color: #666; display: flex; justify-content: space-between; flex-shrink: 0; }
        .footer .key { background: #ff6600; color: #000; padding: 0 3px; font-weight: 700; margin-right: 2px; }
        
        /* Leaflet */
        .leaflet-popup-content-wrapper { background: #111; color: #ccc; border-radius: 0; border: 1px solid #333; font-family: 'Consolas', monospace; font-size: 11px; }
        .leaflet-popup-tip { background: #111; }
        .leaflet-popup-content { margin: 10px; min-width: 220px; }
        .leaflet-popup-close-button { color: #666 !important; }
        .leaflet-popup-close-button:hover { color: #ff6600 !important; }
        .popup-type { color: #f33; font-weight: 700; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
        .popup-row { margin: 4px 0; }
        .popup-row .k { color: #666; }
        .popup-row .v { color: #ccc; }
        .popup-row a { color: #0cc; text-decoration: underline; }
        .leaflet-control-zoom { border: none !important; }
        .leaflet-control-zoom a { background: #111 !important; color: #ff6600 !important; border: 1px solid #333 !important; }
        .leaflet-control-zoom a:hover { background: #222 !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
<div class="terminal">
    <div class="header">
        <span>MIDEAST INCIDENT TRACKER</span>
        <span id="clock"></span>
    </div>
    <div class="nav">
        <a href="index.html">OVERVIEW</a>
        <a href="flights.html">FLIGHTS</a>
        <a href="strikes.html" class="active">INCIDENTS</a>
    </div>
    <div class="ticker">
        <div>
            <span class="label">TIME FILTER:</span>
            <select id="timeFilter">
                <option value="6">Last 6 hours</option>
                <option value="12">Last 12 hours</option>
                <option value="24" selected>Last 24 hours</option>
                <option value="48">Last 48 hours</option>
                <option value="72">Last 72 hours</option>
                <option value="168">Last 7 days</option>
            </select>
        </div>
        <div class="count">SHOWING: <span id="eventCount">0</span> EVENTS</div>
    </div>
    
    <div class="main">
        <div class="map-container">
            <div id="map"></div>
        </div>
        <div class="sidebar">
            <div class="sidebar-header">INCIDENT FEED</div>
            <div class="feed" id="feed"></div>
            <div class="stats">
                <div class="stats-title">CASUALTIES (FEB 28 - MAR 5)</div>
                <div class="stats-grid">
                    <div class="stats-item"><div class="num">~1,045</div><div class="lbl">IRAN</div></div>
                    <div class="stats-item"><div class="num">11</div><div class="lbl">ISRAEL</div></div>
                    <div class="stats-item"><div class="num">6</div><div class="lbl">USA</div></div>
                    <div class="stats-item"><div class="num">7</div><div class="lbl">UAE</div></div>
                    <div class="stats-item"><div class="num">2</div><div class="lbl">SAUDI</div></div>
                    <div class="stats-item"><div class="num" style="color:#fff">~1,071</div><div class="lbl">TOTAL</div></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div><span class="key">F1</span>HELP <span class="key">F2</span>OVERVIEW <span class="key">F3</span>FLIGHTS</div>
        <span>DATA: GDELT, ACLED, OSINT | AUTO-REFRESH 5M</span>
    </div>
</div>

<script>
function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleString('en-US', {
        timeZone: 'UTC', weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }) + ' UTC';
}
updateClock(); setInterval(updateClock, 1000);

const map = L.map('map', { zoomControl: true }).setView([26, 52], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM © CARTO', maxZoom: 19
}).addTo(map);

// Simulated GDELT/ACLED-style incident data
const incidents = [
    // UAE
    { type: 'AIRSTRIKE', lat: 25.12, lon: 55.20, date: '2026-03-05T04:30:00Z', title: 'Drone strike near US Consulate in Dubai; visa, consular appointments cancelled', url: 'theshillongtimes.com', source: 'GDELT', country: 'UAE', hoursAgo: 2 },
    { type: 'MISSILE', lat: 25.20, lon: 55.27, date: '2026-03-04T22:40:00Z', title: 'Ballistic missile intercepted over Dubai; debris falls in Al Barsha residential area', url: 'khaleejtimes.com', source: 'GDELT', country: 'UAE', hoursAgo: 8 },
    { type: 'EXPLOSION', lat: 25.07, lon: 55.14, date: '2026-03-04T23:15:00Z', title: 'Explosion reported near Jebel Ali Port; authorities investigating', url: 'gulfnews.com', source: 'GDELT', country: 'UAE', hoursAgo: 7 },
    { type: 'AIRSTRIKE', lat: 24.45, lon: 54.37, date: '2026-03-04T14:32:00Z', title: 'Drone strike hits Al Salam Naval Base in Abu Dhabi; 4 military personnel killed', url: 'reuters.com', source: 'ACLED', country: 'UAE', hoursAgo: 16 },
    { type: 'MILITARY', lat: 24.42, lon: 54.43, date: '2026-03-04T16:00:00Z', title: 'Etihad Airways HQ evacuated following naval base attack', url: 'aviationweek.com', source: 'GDELT', country: 'UAE', hoursAgo: 14 },
    
    // Saudi Arabia
    { type: 'MISSILE', lat: 26.43, lon: 50.10, date: '2026-03-04T19:15:00Z', title: 'Patriot intercepts missile near Aramco headquarters in Dhahran', url: 'arabnews.com', source: 'GDELT', country: 'Saudi Arabia', hoursAgo: 11 },
    { type: 'MILITARY', lat: 26.30, lon: 50.20, date: '2026-03-04T20:00:00Z', title: 'Aramco evacuates non-essential staff from Eastern Province facilities', url: 'bloomberg.com', source: 'GDELT', country: 'Saudi Arabia', hoursAgo: 10 },
    { type: 'AIRSTRIKE', lat: 26.47, lon: 49.80, date: '2026-03-04T08:00:00Z', title: 'King Fahd Airport Dammam suspends operations after drone threat', url: 'flightradar24.com', source: 'GDELT', country: 'Saudi Arabia', hoursAgo: 22 },
    
    // Bahrain
    { type: 'MILITARY', lat: 26.23, lon: 50.58, date: '2026-03-04T11:20:00Z', title: 'US 5th Fleet raises threat level; non-essential personnel ordered to shelter', url: 'navy.mil', source: 'ACLED', country: 'Bahrain', hoursAgo: 19 },
    { type: 'MISSILE', lat: 26.27, lon: 50.62, date: '2026-03-04T21:00:00Z', title: 'Bahrain Defense Force intercepts drone approaching from northeast', url: 'bna.bh', source: 'GDELT', country: 'Bahrain', hoursAgo: 9 },
    
    // Strait of Hormuz / Naval
    { type: 'NAVAL', lat: 26.25, lon: 56.50, date: '2026-03-04T23:45:00Z', title: 'IRGC fast boats make aggressive approach toward USS carrier group; warning shots fired', url: 'centcom.mil', source: 'ACLED', country: 'Hormuz Strait', hoursAgo: 6 },
    { type: 'NAVAL', lat: 26.58, lon: 56.27, date: '2026-03-04T14:20:00Z', title: 'Iranian vessels harass commercial tanker; US Navy escort responds', url: 'maritime-executive.com', source: 'GDELT', country: 'Hormuz Strait', hoursAgo: 16 },
    { type: 'NAVAL', lat: 25.95, lon: 56.85, date: '2026-03-04T08:00:00Z', title: 'Iranian Kilo-class submarine detected in Gulf of Oman; P-8 Poseidon tracking', url: 'janes.com', source: 'OSINT', country: 'Gulf of Oman', hoursAgo: 22 },
    { type: 'NAVAL', lat: 26.80, lon: 56.10, date: '2026-03-05T06:00:00Z', title: 'UKMTO warns of possible mine-laying activity in Hormuz shipping lanes', url: 'ukmto.org', source: 'GDELT', country: 'Hormuz Strait', hoursAgo: 0.5 },
    
    // Iran (strikes on)
    { type: 'AIRSTRIKE', lat: 35.70, lon: 51.42, date: '2026-03-03T18:00:00Z', title: 'US-Israeli joint strike destroys IRGC command center in Tehran', url: 'timesofisrael.com', source: 'ACLED', country: 'Iran', hoursAgo: 36 },
    { type: 'AIRSTRIKE', lat: 32.65, lon: 51.68, date: '2026-03-03T18:15:00Z', title: 'Isfahan nuclear facility struck; significant damage to centrifuge halls', url: 'bbc.com', source: 'ACLED', country: 'Iran', hoursAgo: 36 },
    { type: 'AIRSTRIKE', lat: 29.62, lon: 52.53, date: '2026-03-03T18:30:00Z', title: 'Shiraz Air Base attacked; multiple fighter jets destroyed on ground', url: 'flightglobal.com', source: 'GDELT', country: 'Iran', hoursAgo: 36 },
    { type: 'EXPLOSION', lat: 36.26, lon: 59.62, date: '2026-03-03T19:00:00Z', title: 'Mashhad missile base struck; large secondary explosions reported', url: 'cnn.com', source: 'ACLED', country: 'Iran', hoursAgo: 35 },
    { type: 'AIRSTRIKE', lat: 27.18, lon: 56.27, date: '2026-03-03T19:30:00Z', title: 'Bandar Abbas naval base hit; fast attack boats destroyed in port', url: 'usni.org', source: 'ACLED', country: 'Iran', hoursAgo: 35 },
    
    // Israel (retaliation)
    { type: 'MISSILE', lat: 32.08, lon: 34.78, date: '2026-03-04T02:00:00Z', title: 'Multiple Iranian missiles intercepted over Tel Aviv; Iron Dome engaged', url: 'haaretz.com', source: 'ACLED', country: 'Israel', hoursAgo: 28 },
    { type: 'MISSILE', lat: 31.77, lon: 35.21, date: '2026-03-04T02:15:00Z', title: 'Arrow system intercepts ballistic missiles over Jerusalem', url: 'jpost.com', source: 'GDELT', country: 'Israel', hoursAgo: 28 },
    
    // Iraq
    { type: 'AIRSTRIKE', lat: 33.31, lon: 44.37, date: '2026-03-03T20:00:00Z', title: 'US strike destroys Iran-backed PMF command post in Baghdad suburbs', url: 'centcom.mil', source: 'ACLED', country: 'Iraq', hoursAgo: 34 },
    
    // Syria
    { type: 'AIRSTRIKE', lat: 33.51, lon: 36.29, date: '2026-03-03T22:00:00Z', title: 'Israeli strike hits IRGC positions near Damascus airport', url: 'syriahr.com', source: 'ACLED', country: 'Syria', hoursAgo: 32 },
    { type: 'EXPLOSION', lat: 34.80, lon: 36.72, date: '2026-03-04T04:00:00Z', title: 'Iranian weapons depot in Homs destroyed; massive secondary explosions', url: 'aljazeera.com', source: 'GDELT', country: 'Syria', hoursAgo: 26 },
    
    // Yemen
    { type: 'AIRSTRIKE', lat: 15.35, lon: 44.21, date: '2026-03-04T16:00:00Z', title: 'US strikes Houthi missile storage and launch sites near Sanaa', url: 'centcom.mil', source: 'ACLED', country: 'Yemen', hoursAgo: 14 },
    { type: 'NAVAL', lat: 14.80, lon: 42.95, date: '2026-03-04T10:00:00Z', title: 'Houthi drone targets commercial vessel in Red Sea; shot down by escort', url: 'ukmto.org', source: 'GDELT', country: 'Red Sea', hoursAgo: 20 },
    
    // Qatar (no strikes, but activity)
    { type: 'MILITARY', lat: 25.26, lon: 51.57, date: '2026-03-04T12:00:00Z', title: 'Al Udeid Air Base at maximum readiness; increased fighter sorties observed', url: 'airandspaceforces.com', source: 'OSINT', country: 'Qatar', hoursAgo: 18 }
];

function createIcon(type) {
    const colors = { AIRSTRIKE: '#f33', MISSILE: '#f33', EXPLOSION: '#ff6600', NAVAL: '#0cc', MILITARY: '#ff0' };
    const color = colors[type] || '#f33';
    return L.divIcon({
        className: 'custom-marker',
        html: `<div style="width:10px;height:10px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 0 6px ${color};"></div>`,
        iconSize: [10, 10],
        iconAnchor: [5, 5]
    });
}

let markers = [];
let currentFilter = 24;

function filterAndRender() {
    // Clear existing
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    document.getElementById('feed').innerHTML = '';
    
    const filtered = incidents.filter(i => i.hoursAgo <= currentFilter);
    document.getElementById('eventCount').textContent = filtered.length;
    
    filtered.forEach((inc, idx) => {
        // Add marker
        const marker = L.marker([inc.lat, inc.lon], { icon: createIcon(inc.type) }).addTo(map);
        marker.bindPopup(`
            <div class="popup-type">${inc.type}</div>
            <div class="popup-row"><span class="k">url:</span> <a href="https://${inc.url}" target="_blank">${inc.url}</a></div>
            <div class="popup-row"><span class="k">date:</span> <span class="v">${inc.date}</span></div>
            <div class="popup-row"><span class="k">title:</span> <span class="v">${inc.title}</span></div>
            <div class="popup-row"><span class="k">source:</span> <span class="v">${inc.source}</span></div>
            <div class="popup-row"><span class="k">country:</span> <span class="v">${inc.country}</span></div>
        `);
        markers.push(marker);
        
        // Add to feed
        const typeClass = inc.type === 'NAVAL' ? 'naval' : inc.type === 'MILITARY' ? 'military' : '';
        const feedItem = document.createElement('div');
        feedItem.className = 'feed-item';
        feedItem.innerHTML = `
            <div class="type ${typeClass}">${inc.type}</div>
            <div class="title">${inc.title}</div>
            <div class="meta"><span class="country">${inc.country}</span> · ${inc.hoursAgo < 1 ? 'Just now' : inc.hoursAgo + 'h ago'} · ${inc.source}</div>
        `;
        feedItem.onclick = () => {
            map.flyTo([inc.lat, inc.lon], 8, { duration: 0.5 });
            marker.openPopup();
        };
        document.getElementById('feed').appendChild(feedItem);
    });
}

document.getElementById('timeFilter').onchange = function() {
    currentFilter = parseInt(this.value);
    filterAndRender();
};

filterAndRender();
setTimeout(() => location.reload(), 300000);
</script>
</body>
</html>
