<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIGHTS | MIDEAST</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ccc; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; line-height: 1.3; }
        .terminal { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #ff6600; color: #000; padding: 3px 8px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .nav { background: #000; border-bottom: 1px solid #333; display: flex; flex-shrink: 0; }
        .nav a { color: #fa0; text-decoration: none; padding: 4px 16px; font-size: 11px; border-right: 1px solid #333; }
        .nav a:hover { background: #111; }
        .nav a.active { background: #ff6600; color: #000; font-weight: 700; }
        
        .toolbar { background: #111; border-bottom: 1px solid #333; padding: 6px 8px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
        .toolbar label { color: #666; font-size: 10px; }
        .toolbar select, .toolbar input { background: #000; color: #ff6600; border: 1px solid #333; padding: 3px 8px; font-family: inherit; font-size: 11px; }
        .toolbar input { width: 120px; }
        .toolbar .stats { margin-left: auto; color: #0cc; font-size: 11px; }
        .toolbar .stats span { margin-left: 12px; }
        .toolbar .stats .red { color: #f33; }
        .toolbar .stats .yellow { color: #ff0; }
        .toolbar .stats .green { color: #0c0; }
        
        .main { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        
        #map { height: 280px; flex-shrink: 0; border-bottom: 1px solid #333; }
        
        .table-container { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        thead { position: sticky; top: 0; z-index: 10; }
        th { background: #111; color: #fa0; text-align: left; padding: 6px 8px; font-weight: 600; font-size: 10px; border-bottom: 1px solid #333; cursor: pointer; user-select: none; white-space: nowrap; }
        th:hover { background: #1a1a1a; }
        th.sorted { color: #ff6600; }
        th .arrow { margin-left: 4px; font-size: 8px; }
        td { padding: 5px 8px; border-bottom: 1px solid #1a1a1a; white-space: nowrap; }
        tr:hover td { background: #0a0a0a; }
        tr.selected td { background: #1a1a00; }
        tr { cursor: pointer; }
        
        .fnum { color: #ff6600; font-weight: 600; }
        .route { color: #ccc; }
        .route .arr { color: #0cc; }
        .aircraft { color: #666; }
        .alt { color: #888; }
        .speed { color: #888; }
        
        .status { display: inline-block; padding: 2px 6px; font-size: 9px; font-weight: 700; min-width: 50px; text-align: center; }
        .status.airborne { background: #0c0; color: #000; }
        .status.scheduled { background: #0cc; color: #000; }
        .status.delayed { background: #ff0; color: #000; }
        .status.canceled { background: #f33; color: #fff; }
        .status.landed { background: #666; color: #fff; }
        
        .delay { color: #ff0; }
        .delay.severe { color: #f33; }
        
        .footer { background: #111; border-top: 1px solid #333; padding: 4px 8px; font-size: 10px; color: #666; display: flex; justify-content: space-between; flex-shrink: 0; }
        .footer .key { background: #ff6600; color: #000; padding: 0 3px; font-weight: 700; margin-right: 2px; }
        
        .c-red { color: #f33; } .c-orange { color: #ff6600; } .c-yellow { color: #ff0; } .c-green { color: #0c0; } .c-cyan { color: #0cc; } .c-dim { color: #666; }
        
        /* Leaflet */
        .leaflet-popup-content-wrapper { background: #111; color: #ccc; border-radius: 0; border: 1px solid #333; font-family: 'Consolas', monospace; font-size: 11px; }
        .leaflet-popup-tip { background: #111; }
        .leaflet-popup-content { margin: 10px; min-width: 180px; }
        .leaflet-popup-close-button { color: #666 !important; }
        .leaflet-popup-close-button:hover { color: #ff6600 !important; }
        .popup-type { color: #ff6600; font-weight: 700; font-size: 11px; margin-bottom: 6px; }
        .popup-row { margin: 3px 0; font-size: 10px; }
        .popup-row .k { color: #666; }
        .popup-row .v { color: #ccc; }
        .leaflet-control-zoom { border: none !important; }
        .leaflet-control-zoom a { background: #111 !important; color: #ff6600 !important; border: 1px solid #333 !important; }
        .leaflet-control-zoom a:hover { background: #222 !important; }
        
        .plane-icon { font-size: 16px; text-shadow: 0 0 4px rgba(0,0,0,0.8); }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
<div class="terminal">
    <div class="header">
        <span>MIDEAST FLIGHT TRACKER</span>
        <span id="clock"></span>
    </div>
    <div class="nav">
        <a href="index.html">OVERVIEW</a>
        <a href="flights.html" class="active">FLIGHTS</a>
        <a href="strikes.html">INCIDENTS</a>
    </div>
    
    <div class="toolbar">
        <div>
            <label>STATUS</label>
            <select id="statusFilter">
                <option value="all">All</option>
                <option value="airborne">Airborne</option>
                <option value="scheduled">Scheduled</option>
                <option value="delayed">Delayed</option>
                <option value="canceled">Canceled</option>
                <option value="landed">Landed</option>
            </select>
        </div>
        <div>
            <label>AIRLINE</label>
            <select id="airlineFilter">
                <option value="all">All</option>
                <option value="EK">Emirates</option>
                <option value="EY">Etihad</option>
                <option value="QR">Qatar</option>
                <option value="SV">Saudia</option>
                <option value="GF">Gulf Air</option>
                <option value="WY">Oman Air</option>
            </select>
        </div>
        <div>
            <label>ORIGIN</label>
            <select id="originFilter">
                <option value="all">All</option>
                <option value="DXB">DXB</option>
                <option value="AUH">AUH</option>
                <option value="DOH">DOH</option>
                <option value="RUH">RUH</option>
                <option value="JED">JED</option>
                <option value="MCT">MCT</option>
            </select>
        </div>
        <div>
            <label>SEARCH</label>
            <input type="text" id="searchInput" placeholder="Flight #...">
        </div>
        <div class="stats">
            <span class="green">AIRBORNE: <span id="airborneCount">0</span></span>
            <span>SCHED: <span id="schedCount">0</span></span>
            <span class="yellow">DELAYED: <span id="delayedCount">0</span></span>
            <span class="red">CANCELED: <span id="canceledCount">0</span></span>
        </div>
    </div>
    
    <div class="main">
        <div id="map"></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th data-sort="flight">FLIGHT <span class="arrow"></span></th>
                        <th data-sort="airline">AIRLINE <span class="arrow"></span></th>
                        <th data-sort="origin">ORIGIN <span class="arrow"></span></th>
                        <th data-sort="dest">DEST <span class="arrow"></span></th>
                        <th data-sort="aircraft">AIRCRAFT <span class="arrow"></span></th>
                        <th data-sort="dep">DEP <span class="arrow"></span></th>
                        <th data-sort="arr">ARR <span class="arrow"></span></th>
                        <th data-sort="status">STATUS <span class="arrow"></span></th>
                        <th data-sort="delay">DELAY <span class="arrow"></span></th>
                        <th data-sort="alt">ALT <span class="arrow"></span></th>
                        <th data-sort="speed">SPD <span class="arrow"></span></th>
                        <th data-sort="pos">POSITION <span class="arrow"></span></th>
                    </tr>
                </thead>
                <tbody id="flightTable"></tbody>
            </table>
        </div>
    </div>
    
    <div class="footer">
        <div><span class="key">↑↓</span>SCROLL <span class="key">CLICK</span>TRACK ON MAP <span class="key">DBL</span>ZOOM</div>
        <span>SIMULATED DATA | AUTO-REFRESH 30S | <span id="flightCount">0</span> FLIGHTS</span>
    </div>
</div>

<script>
function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleString('en-US', {
        timeZone: 'UTC', weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }) + ' UTC';
}
updateClock(); setInterval(updateClock, 1000);

// Map setup
const map = L.map('map', { zoomControl: true }).setView([26, 52], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM © CARTO', maxZoom: 19
}).addTo(map);

// Closed airspace
L.polygon([[38,44],[38,63],[25,63],[25,56],[29,48],[33,44]], 
    { color: '#f33', weight: 1, fillColor: '#f33', fillOpacity: 0.08, dashArray: '5,5' }).addTo(map);

// Airports
const airports = {
    DXB: { lat: 25.253, lon: 55.366, name: 'Dubai' },
    AUH: { lat: 24.433, lon: 54.651, name: 'Abu Dhabi' },
    DOH: { lat: 25.261, lon: 51.565, name: 'Doha' },
    RUH: { lat: 24.958, lon: 46.699, name: 'Riyadh' },
    JED: { lat: 21.679, lon: 39.157, name: 'Jeddah' },
    DMM: { lat: 26.471, lon: 49.798, name: 'Dammam' },
    BAH: { lat: 26.270, lon: 50.634, name: 'Bahrain' },
    MCT: { lat: 23.593, lon: 58.284, name: 'Muscat' },
    LHR: { lat: 51.470, lon: -0.454, name: 'London' },
    CDG: { lat: 49.013, lon: 2.551, name: 'Paris' },
    JFK: { lat: 40.641, lon: -73.778, name: 'New York' },
    SIN: { lat: 1.350, lon: 103.994, name: 'Singapore' },
    BKK: { lat: 13.690, lon: 100.751, name: 'Bangkok' },
    DEL: { lat: 28.556, lon: 77.100, name: 'Delhi' },
    BOM: { lat: 19.089, lon: 72.868, name: 'Mumbai' },
    IST: { lat: 41.262, lon: 28.729, name: 'Istanbul' },
    FRA: { lat: 50.034, lon: 8.562, name: 'Frankfurt' },
    CAI: { lat: 30.122, lon: 31.406, name: 'Cairo' },
    KWI: { lat: 29.227, lon: 47.969, name: 'Kuwait' },
    CMB: { lat: 7.181, lon: 79.884, name: 'Colombo' },
    MNL: { lat: 14.509, lon: 121.020, name: 'Manila' },
    HKG: { lat: 22.309, lon: 113.915, name: 'Hong Kong' },
    NRT: { lat: 35.772, lon: 140.393, name: 'Tokyo' },
    SYD: { lat: -33.946, lon: 151.177, name: 'Sydney' }
};

// Airlines
const airlines = {
    EK: { name: 'Emirates', base: 'DXB', color: '#c60c30' },
    EY: { name: 'Etihad', base: 'AUH', color: '#bd8b13' },
    QR: { name: 'Qatar Airways', base: 'DOH', color: '#5c0632' },
    SV: { name: 'Saudia', base: 'RUH', color: '#006747' },
    GF: { name: 'Gulf Air', base: 'BAH', color: '#c8a415' },
    WY: { name: 'Oman Air', base: 'MCT', color: '#c41230' }
};

const aircraft = ['B777-300ER', 'A380-800', 'B787-9', 'A350-900', 'A321neo', 'B737-800', 'A330-300'];
const statuses = ['airborne', 'scheduled', 'delayed', 'canceled', 'landed'];
const reasons = ['AIRSPACE', 'SECURITY', 'REROUTE', 'CREW', 'WEATHER', 'MIL OPS'];

// Generate flights
let flights = [];
let flightMarkers = {};
let routeLines = {};
let selectedFlight = null;

function rnd(a) { return a[Math.floor(Math.random() * a.length)]; }
function rndNum(min, max) { return min + Math.floor(Math.random() * (max - min)); }

function generateFlights() {
    flights = [];
    const gulfApts = ['DXB', 'AUH', 'DOH', 'RUH', 'JED', 'MCT', 'BAH', 'DMM'];
    const intlApts = ['LHR', 'CDG', 'JFK', 'SIN', 'BKK', 'DEL', 'BOM', 'IST', 'FRA', 'CAI', 'MNL', 'HKG', 'NRT', 'SYD', 'CMB', 'KWI'];
    
    const airlineKeys = Object.keys(airlines);
    
    for (let i = 0; i < 120; i++) {
        const alCode = rnd(airlineKeys);
        const al = airlines[alCode];
        const isOutbound = Math.random() > 0.4;
        const origin = isOutbound ? al.base : rnd(intlApts);
        const dest = isOutbound ? rnd(intlApts) : al.base;
        
        const status = rnd(statuses);
        const now = new Date();
        const depOffset = rndNum(-120, 240);
        const depTime = new Date(now.getTime() + depOffset * 60000);
        const flightDuration = rndNum(180, 720);
        const arrTime = new Date(depTime.getTime() + flightDuration * 60000);
        
        let delay = 0;
        if (status === 'delayed') delay = rndNum(30, 240);
        
        // Calculate position for airborne flights
        let pos = null;
        let alt = null;
        let speed = null;
        let heading = 0;
        
        if (status === 'airborne' && airports[origin] && airports[dest]) {
            const progress = Math.random() * 0.8 + 0.1; // 10-90% along route
            const oLat = airports[origin].lat;
            const oLon = airports[origin].lon;
            const dLat = airports[dest].lat;
            const dLon = airports[dest].lon;
            
            // Great circle interpolation (simplified)
            pos = {
                lat: oLat + (dLat - oLat) * progress + (Math.random() - 0.5) * 2,
                lon: oLon + (dLon - oLon) * progress + (Math.random() - 0.5) * 2
            };
            alt = rndNum(32000, 42000);
            speed = rndNum(480, 560);
            heading = Math.atan2(dLon - oLon, dLat - oLat) * 180 / Math.PI;
        }
        
        flights.push({
            id: i,
            flight: `${alCode}${rndNum(100, 999)}`,
            airline: alCode,
            airlineName: al.name,
            origin,
            dest,
            aircraft: rnd(aircraft),
            depTime,
            arrTime,
            status,
            delay,
            reason: status === 'canceled' ? rnd(reasons) : '',
            pos,
            alt,
            speed,
            heading
        });
    }
    
    // Sort by departure time
    flights.sort((a, b) => a.depTime - b.depTime);
}

function formatTime(d) {
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'UTC' }) + 'Z';
}

function planeIcon(heading, status) {
    const color = status === 'airborne' ? '#0c0' : '#666';
    const rotation = heading - 45; // Adjust for plane emoji orientation
    return L.divIcon({
        className: 'plane-marker',
        html: `<div class="plane-icon" style="transform:rotate(${rotation}deg);color:${color};">✈</div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
    });
}

function renderMap() {
    // Clear existing
    Object.values(flightMarkers).forEach(m => map.removeLayer(m));
    Object.values(routeLines).forEach(l => map.removeLayer(l));
    flightMarkers = {};
    routeLines = {};
    
    flights.filter(f => f.status === 'airborne' && f.pos).forEach(f => {
        const marker = L.marker([f.pos.lat, f.pos.lon], { 
            icon: planeIcon(f.heading, f.status)
        }).addTo(map);
        
        marker.bindPopup(`
            <div class="popup-type">${f.flight}</div>
            <div class="popup-row"><span class="k">airline:</span> <span class="v">${f.airlineName}</span></div>
            <div class="popup-row"><span class="k">route:</span> <span class="v">${f.origin} → ${f.dest}</span></div>
            <div class="popup-row"><span class="k">aircraft:</span> <span class="v">${f.aircraft}</span></div>
            <div class="popup-row"><span class="k">altitude:</span> <span class="v">${f.alt?.toLocaleString()} ft</span></div>
            <div class="popup-row"><span class="k">speed:</span> <span class="v">${f.speed} kts</span></div>
            <div class="popup-row"><span class="k">status:</span> <span class="v" style="color:#0c0">AIRBORNE</span></div>
        `);
        
        flightMarkers[f.id] = marker;
        
        // Draw route line
        if (airports[f.origin] && airports[f.dest]) {
            const line = L.polyline([
                [airports[f.origin].lat, airports[f.origin].lon],
                [f.pos.lat, f.pos.lon],
                [airports[f.dest].lat, airports[f.dest].lon]
            ], { color: '#333', weight: 1, opacity: 0.5, dashArray: '3,6' }).addTo(map);
            routeLines[f.id] = line;
        }
    });
}

function getFilteredFlights() {
    const status = document.getElementById('statusFilter').value;
    const airline = document.getElementById('airlineFilter').value;
    const origin = document.getElementById('originFilter').value;
    const search = document.getElementById('searchInput').value.toUpperCase();
    
    return flights.filter(f => {
        if (status !== 'all' && f.status !== status) return false;
        if (airline !== 'all' && f.airline !== airline) return false;
        if (origin !== 'all' && f.origin !== origin) return false;
        if (search && !f.flight.includes(search)) return false;
        return true;
    });
}

function renderTable() {
    const filtered = getFilteredFlights();
    const tbody = document.getElementById('flightTable');
    
    tbody.innerHTML = filtered.map(f => `
        <tr data-id="${f.id}" class="${selectedFlight === f.id ? 'selected' : ''}">
            <td class="fnum">${f.flight}</td>
            <td>${f.airlineName}</td>
            <td>${f.origin}</td>
            <td class="c-cyan">${f.dest}</td>
            <td class="aircraft">${f.aircraft}</td>
            <td>${formatTime(f.depTime)}</td>
            <td>${formatTime(f.arrTime)}</td>
            <td><span class="status ${f.status}">${f.status.toUpperCase()}</span></td>
            <td>${f.delay ? `<span class="delay ${f.delay > 120 ? 'severe' : ''}">${f.delay > 0 ? '+' : ''}${f.delay}m</span>` : '-'}</td>
            <td class="alt">${f.alt ? f.alt.toLocaleString() + ' ft' : '-'}</td>
            <td class="speed">${f.speed ? f.speed + ' kts' : '-'}</td>
            <td class="c-dim">${f.pos ? `${f.pos.lat.toFixed(2)}, ${f.pos.lon.toFixed(2)}` : '-'}</td>
        </tr>
    `).join('');
    
    // Update counts
    const counts = { airborne: 0, scheduled: 0, delayed: 0, canceled: 0 };
    flights.forEach(f => counts[f.status] = (counts[f.status] || 0) + 1);
    document.getElementById('airborneCount').textContent = counts.airborne;
    document.getElementById('schedCount').textContent = counts.scheduled;
    document.getElementById('delayedCount').textContent = counts.delayed;
    document.getElementById('canceledCount').textContent = counts.canceled;
    document.getElementById('flightCount').textContent = filtered.length;
    
    // Row click handlers
    tbody.querySelectorAll('tr').forEach(row => {
        row.addEventListener('click', () => {
            const id = parseInt(row.dataset.id);
            selectedFlight = id;
            const flight = flights.find(f => f.id === id);
            
            // Highlight row
            tbody.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            
            // Show on map
            if (flight.pos && flightMarkers[id]) {
                map.flyTo([flight.pos.lat, flight.pos.lon], 6, { duration: 0.5 });
                flightMarkers[id].openPopup();
                
                // Highlight route
                Object.values(routeLines).forEach(l => l.setStyle({ color: '#333', weight: 1 }));
                if (routeLines[id]) {
                    routeLines[id].setStyle({ color: '#ff6600', weight: 2 });
                    routeLines[id].bringToFront();
                }
            } else if (airports[flight.origin]) {
                map.flyTo([airports[flight.origin].lat, airports[flight.origin].lon], 6, { duration: 0.5 });
            }
        });
        
        row.addEventListener('dblclick', () => {
            const id = parseInt(row.dataset.id);
            const flight = flights.find(f => f.id === id);
            if (flight.pos) {
                map.flyTo([flight.pos.lat, flight.pos.lon], 8, { duration: 0.5 });
            }
        });
    });
}

// Sorting
let sortCol = 'dep';
let sortDir = 1;

document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) {
            sortDir *= -1;
        } else {
            sortCol = col;
            sortDir = 1;
        }
        
        // Update headers
        document.querySelectorAll('th').forEach(h => {
            h.classList.remove('sorted');
            h.querySelector('.arrow').textContent = '';
        });
        th.classList.add('sorted');
        th.querySelector('.arrow').textContent = sortDir === 1 ? '▲' : '▼';
        
        // Sort
        const key = {
            flight: f => f.flight,
            airline: f => f.airlineName,
            origin: f => f.origin,
            dest: f => f.dest,
            aircraft: f => f.aircraft,
            dep: f => f.depTime,
            arr: f => f.arrTime,
            status: f => f.status,
            delay: f => f.delay,
            alt: f => f.alt || 0,
            speed: f => f.speed || 0,
            pos: f => f.pos ? f.pos.lat : 0
        }[col];
        
        flights.sort((a, b) => {
            const av = key(a), bv = key(b);
            if (av < bv) return -sortDir;
            if (av > bv) return sortDir;
            return 0;
        });
        
        renderTable();
    });
});

// Filters
['statusFilter', 'airlineFilter', 'originFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', renderTable);
});
document.getElementById('searchInput').addEventListener('input', renderTable);

// Initial render
generateFlights();
renderMap();
renderTable();

// Refresh
setInterval(() => {
    generateFlights();
    renderMap();
    renderTable();
}, 30000);

setTimeout(() => location.reload(), 600000);
</script>
</body>
</html>
