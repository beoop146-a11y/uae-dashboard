<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDEAST CRISIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ccc; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; line-height: 1.3; }
        .terminal { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #ff6600; color: #000; padding: 3px 8px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .nav { background: #000; border-bottom: 1px solid #333; display: flex; flex-shrink: 0; }
        .nav a { color: #fa0; text-decoration: none; padding: 4px 16px; font-size: 11px; border-right: 1px solid #333; }
        .nav a:hover { background: #111; }
        .nav a.active { background: #ff6600; color: #000; font-weight: 700; }
        .ticker { background: #111; border-bottom: 1px solid #333; padding: 4px 8px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .ticker .status { display: flex; align-items: center; gap: 8px; }
        .status-light { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-light.live { background: #0c0; animation: pulse 2s infinite; }
        .status-light.cached { background: #ff0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .main { display: flex; flex: 1; min-height: 0; }
        .map-container { flex: 1; position: relative; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        
        .sidebar { width: 320px; background: #000; border-left: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .panel { border-bottom: 1px solid #333; }
        .panel-title { background: #ff6600; color: #000; padding: 3px 6px; font-weight: 700; font-size: 10px; display: flex; justify-content: space-between; }
        .panel-title .tag { background: #000; color: #ff6600; padding: 0 4px; font-size: 9px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
        .stat { padding: 8px 4px; text-align: center; border-right: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .stat .num { font-size: 18px; font-weight: 700; }
        .stat .lbl { font-size: 8px; color: #666; }
        
        .feed { max-height: 220px; overflow-y: auto; }
        .feed-item { padding: 6px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 10px; }
        .feed-item:hover { background: #111; }
        .feed-item .source { color: #0cc; font-size: 9px; }
        .feed-item .title { color: #ccc; margin: 3px 0; line-height: 1.3; }
        .feed-item .title a { color: #ccc; text-decoration: none; }
        .feed-item .title a:hover { color: #ff6600; }
        .feed-item .meta { color: #666; font-size: 9px; }
        
        .loading { padding: 20px; text-align: center; color: #666; font-size: 10px; }
        
        .airport-row { display: grid; grid-template-columns: 45px 1fr 50px; gap: 4px; padding: 4px 6px; border-bottom: 1px solid #1a1a1a; font-size: 10px; }
        .airport-row:hover { background: #111; cursor: pointer; }
        .airport-row .code { color: #ff6600; font-weight: 700; }
        .airport-row .name { color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .airport-row .flights { color: #0c0; text-align: right; }
        
        .c-red { color: #f33; } .c-orange { color: #ff6600; } .c-yellow { color: #ff0; } .c-green { color: #0c0; } .c-cyan { color: #0cc; } .c-dim { color: #666; }
        
        .footer { background: #111; border-top: 1px solid #333; padding: 4px 8px; font-size: 10px; color: #666; display: flex; justify-content: space-between; flex-shrink: 0; }
        
        /* Leaflet */
        .leaflet-popup-content-wrapper { background: #111; color: #ccc; border-radius: 0; border: 1px solid #333; font-family: 'Consolas', monospace; font-size: 11px; }
        .leaflet-popup-tip { background: #111; }
        .leaflet-popup-content { margin: 10px; min-width: 200px; }
        .leaflet-popup-close-button { color: #666 !important; }
        .leaflet-popup-close-button:hover { color: #ff6600 !important; }
        .popup-title { color: #ff6600; font-weight: 700; font-size: 11px; margin-bottom: 6px; }
        .popup-row { margin: 3px 0; font-size: 10px; }
        .popup-row .k { color: #666; }
        .popup-row .v { color: #ccc; }
        .popup-row a { color: #0cc; }
        .leaflet-control-zoom { border: none !important; }
        .leaflet-control-zoom a { background: #111 !important; color: #ff6600 !important; border: 1px solid #333 !important; }
        .leaflet-control-zoom a:hover { background: #222 !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
<div class="terminal">
    <div class="header">
        <span>MIDEAST SITUATION MONITOR</span>
        <span id="clock"></span>
    </div>
    <div class="nav">
        <a href="index.html" class="active">OVERVIEW</a>
        <a href="flights.html">FLIGHTS</a>
        <a href="strikes.html">INCIDENTS</a>
    </div>
    <div class="ticker">
        <div class="status">
            <span class="status-light" id="statusLight"></span>
            <span id="statusText">Loading...</span>
        </div>
        <span class="c-dim">OPENSKY + GDELT LIVE DATA</span>
    </div>
    
    <div class="main">
        <div class="map-container">
            <div id="map"></div>
        </div>
        <div class="sidebar">
            <div class="panel">
                <div class="panel-title">LIVE TRAFFIC <span class="tag" id="flightTag">LOADING</span></div>
                <div class="stats-grid">
                    <div class="stat"><div class="num c-green" id="airborneNum">-</div><div class="lbl">AIRBORNE</div></div>
                    <div class="stat"><div class="num" id="groundNum">-</div><div class="lbl">ON GROUND</div></div>
                    <div class="stat"><div class="num c-cyan" id="totalNum">-</div><div class="lbl">TOTAL</div></div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-title">AIRPORTS <span class="tag">COVERAGE</span></div>
                <div id="airportList" class="loading">Loading...</div>
            </div>
            
            <div class="panel">
                <div class="panel-title">NEWS FEED <span class="tag" id="newsTag">GDELT</span></div>
                <div class="feed" id="newsFeed">
                    <div class="loading">Loading news...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <span>DATA: OpenSky Network (flights) • GDELT Project (news)</span>
        <span>REFRESH: 30s flights / 5m news</span>
    </div>
</div>

<script>
const OPENSKY_BBOX = { lamin: 12, lamax: 42, lomin: 30, lomax: 65 };
const CORS_PROXY = 'https://corsproxy.io/?';

const AIRPORTS = [
    { code: 'DXB', name: 'Dubai Intl', lat: 25.253, lon: 55.366, country: 'UAE' },
    { code: 'AUH', name: 'Abu Dhabi', lat: 24.433, lon: 54.651, country: 'UAE' },
    { code: 'DOH', name: 'Hamad Intl', lat: 25.261, lon: 51.565, country: 'Qatar' },
    { code: 'RUH', name: 'King Khalid', lat: 24.958, lon: 46.699, country: 'Saudi' },
    { code: 'JED', name: 'Jeddah', lat: 21.679, lon: 39.157, country: 'Saudi' },
    { code: 'TLV', name: 'Ben Gurion', lat: 32.011, lon: 34.887, country: 'Israel' },
    { code: 'CAI', name: 'Cairo Intl', lat: 30.122, lon: 31.406, country: 'Egypt' },
    { code: 'IST', name: 'Istanbul', lat: 41.262, lon: 28.729, country: 'Turkey' },
    { code: 'BAH', name: 'Bahrain', lat: 26.270, lon: 50.634, country: 'Bahrain' },
    { code: 'MCT', name: 'Muscat', lat: 23.593, lon: 58.284, country: 'Oman' }
];

let flights = [];
let articles = [];
let flightMarkers = [];
let map;

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleString('en-US', {
        timeZone: 'UTC', weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }) + ' UTC';
}
updateClock();
setInterval(updateClock, 1000);

// Map setup
map = L.map('map', { zoomControl: true }).setView([26, 48], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM © CARTO', maxZoom: 19
}).addTo(map);

// Coverage box
L.rectangle([[OPENSKY_BBOX.lamin, OPENSKY_BBOX.lomin], [OPENSKY_BBOX.lamax, OPENSKY_BBOX.lomax]], {
    color: '#ff6600', weight: 1, fillOpacity: 0.02, dashArray: '5,5'
}).addTo(map);

// Airport markers
const airportMarkers = {};
AIRPORTS.forEach(apt => {
    const m = L.circleMarker([apt.lat, apt.lon], {
        radius: 6, color: '#ff6600', fillColor: '#000', fillOpacity: 1, weight: 2
    }).addTo(map);
    m.bindPopup(`<div class="popup-title">${apt.code} — ${apt.name}</div><div class="popup-row"><span class="k">country:</span> <span class="v">${apt.country}</span></div>`);
    m.bindTooltip(apt.code, { permanent: true, direction: 'right', offset: [8, 0], className: 'airport-label' });
    airportMarkers[apt.code] = m;
});

function updateStatus(text, isLive) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusLight').className = 'status-light ' + (isLive ? 'live' : 'cached');
}

function createPlaneIcon(heading) {
    return L.divIcon({
        className: 'plane-marker',
        html: `<div style="font-size:12px;transform:rotate(${(heading || 0) - 45}deg);color:#0c0;text-shadow:0 0 3px #000;">✈</div>`,
        iconSize: [12, 12],
        iconAnchor: [6, 6]
    });
}

async function fetchFlights() {
    const url = `https://opensky-network.org/api/states/all?lamin=${OPENSKY_BBOX.lamin}&lomin=${OPENSKY_BBOX.lomin}&lamax=${OPENSKY_BBOX.lamax}&lomax=${OPENSKY_BBOX.lomax}`;
    
    try {
        let response = await fetch(url);
        if (!response.ok) throw new Error('Direct failed');
        return await response.json();
    } catch {
        const response = await fetch(CORS_PROXY + encodeURIComponent(url));
        if (!response.ok) throw new Error('API error');
        return await response.json();
    }
}

function countNearAirport(apt, flights) {
    return flights.filter(f => {
        const dist = Math.sqrt(Math.pow(f.lat - apt.lat, 2) + Math.pow(f.lon - apt.lon, 2));
        return dist < 1.5; // ~150km radius
    }).length;
}

async function refreshFlights() {
    try {
        const data = await fetchFlights();
        flights = (data.states || []).map(s => ({
            callsign: (s[1] || '').trim(),
            lat: s[6],
            lon: s[5],
            alt: s[7] ? Math.round(s[7] * 3.28084) : null,
            heading: s[10],
            onGround: s[8],
            speed: s[9] ? Math.round(s[9] * 1.94384) : null
        })).filter(f => f.lat && f.lon);
        
        const airborne = flights.filter(f => !f.onGround).length;
        const ground = flights.filter(f => f.onGround).length;
        
        document.getElementById('airborneNum').textContent = airborne;
        document.getElementById('groundNum').textContent = ground;
        document.getElementById('totalNum').textContent = flights.length;
        document.getElementById('flightTag').textContent = 'LIVE';
        
        // Update airport list
        const aptList = document.getElementById('airportList');
        aptList.innerHTML = AIRPORTS.map(apt => {
            const count = countNearAirport(apt, flights);
            return `<div class="airport-row" data-code="${apt.code}">
                <span class="code">${apt.code}</span>
                <span class="name">${apt.name}</span>
                <span class="flights">${count} ✈</span>
            </div>`;
        }).join('');
        
        aptList.querySelectorAll('.airport-row').forEach(row => {
            row.onclick = () => {
                const apt = AIRPORTS.find(a => a.code === row.dataset.code);
                if (apt) {
                    map.flyTo([apt.lat, apt.lon], 8, { duration: 0.5 });
                    airportMarkers[apt.code].openPopup();
                }
            };
        });
        
        // Update map markers
        flightMarkers.forEach(m => map.removeLayer(m));
        flightMarkers = [];
        
        flights.filter(f => !f.onGround).forEach(f => {
            const m = L.marker([f.lat, f.lon], { icon: createPlaneIcon(f.heading) }).addTo(map);
            m.bindPopup(`<div class="popup-title">${f.callsign || 'Unknown'}</div>
                <div class="popup-row"><span class="k">alt:</span> <span class="v">${f.alt ? f.alt.toLocaleString() + ' ft' : 'N/A'}</span></div>
                <div class="popup-row"><span class="k">speed:</span> <span class="v">${f.speed ? f.speed + ' kts' : 'N/A'}</span></div>`);
            flightMarkers.push(m);
        });
        
        updateStatus(`LIVE — ${flights.length} aircraft tracked`, true);
        localStorage.setItem('flightCache', JSON.stringify({ time: Date.now(), flights }));
    } catch (err) {
        console.error('Flight fetch error:', err);
        document.getElementById('flightTag').textContent = 'CACHED';
        
        const cached = localStorage.getItem('flightCache');
        if (cached) {
            const { flights: cachedFlights } = JSON.parse(cached);
            flights = cachedFlights;
            document.getElementById('airborneNum').textContent = flights.filter(f => !f.onGround).length;
            document.getElementById('groundNum').textContent = flights.filter(f => f.onGround).length;
            document.getElementById('totalNum').textContent = flights.length;
        }
        updateStatus('Connection issue — showing cached data', false);
    }
}

async function fetchNews() {
    const url = 'https://api.gdeltproject.org/api/v2/doc/doc?query=(military%20OR%20missile%20OR%20strike%20OR%20attack)%20(Iran%20OR%20Israel%20OR%20Yemen%20OR%20UAE%20OR%20Gaza)&mode=artlist&format=json&maxrecords=15&timespan=24h&sort=datedesc';
    
    try {
        let response = await fetch(url);
        let text = await response.text();
        if (text.includes('Please limit')) throw new Error('Rate limited');
        return JSON.parse(text);
    } catch {
        const response = await fetch(CORS_PROXY + encodeURIComponent(url));
        const text = await response.text();
        if (text.includes('Please limit')) throw new Error('Rate limited');
        return JSON.parse(text);
    }
}

function timeAgo(dateStr) {
    const date = new Date(dateStr);
    const diffMs = Date.now() - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    if (diffMins < 60) return `${diffMins}m ago`;
    if (diffHours < 24) return `${diffHours}h ago`;
    return `${Math.floor(diffHours / 24)}d ago`;
}

function domainFromUrl(url) {
    try { return new URL(url).hostname.replace('www.', ''); } catch { return url.slice(0, 25); }
}

async function refreshNews() {
    try {
        const data = await fetchNews();
        articles = data.articles || [];
        document.getElementById('newsTag').textContent = 'LIVE';
        
        const feed = document.getElementById('newsFeed');
        if (articles.length === 0) {
            feed.innerHTML = '<div class="loading">No recent news</div>';
            return;
        }
        
        feed.innerHTML = articles.slice(0, 12).map(art => `
            <div class="feed-item">
                <div class="source">${domainFromUrl(art.url)}</div>
                <div class="title"><a href="${art.url}" target="_blank">${art.title}</a></div>
                <div class="meta">${art.seendate ? timeAgo(art.seendate) : ''}</div>
            </div>
        `).join('');
        
        localStorage.setItem('newsCache', JSON.stringify({ time: Date.now(), articles }));
    } catch (err) {
        console.error('News fetch error:', err);
        document.getElementById('newsTag').textContent = 'CACHED';
        
        const cached = localStorage.getItem('newsCache');
        if (cached) {
            const { articles: cachedArticles } = JSON.parse(cached);
            articles = cachedArticles;
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = articles.slice(0, 12).map(art => `
                <div class="feed-item">
                    <div class="source">${domainFromUrl(art.url)}</div>
                    <div class="title"><a href="${art.url}" target="_blank">${art.title}</a></div>
                    <div class="meta">${art.seendate ? timeAgo(art.seendate) : ''}</div>
                </div>
            `).join('');
        } else {
            document.getElementById('newsFeed').innerHTML = '<div class="loading">News temporarily unavailable</div>';
        }
    }
}

// Initial load
refreshFlights();
refreshNews();

// Auto-refresh
setInterval(refreshFlights, 30000);
setInterval(refreshNews, 300000);

// Full page refresh every 15 min
setTimeout(() => location.reload(), 900000);
</script>
</body>
</html>
